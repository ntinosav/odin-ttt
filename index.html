<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <h1>Tic - Tac - Toe</h1>
    <div id="players">
        <h2 id="p1"></h2>
        <h2>vs</h2>
        <h2 id="p2"></h2>
    </div>

    <table id="board">
        <tr>
            <td><div id="11"></div></td>
            <td><div id="12"></div></td>
            <td><div id="13"></div></td>
        </tr>
        <tr>
            <td><div id="21"></div></td>
            <td><div id="22"></div></td>
            <td><div id="23"></div></td>
        </tr>
        <tr>
            <td><div id="31"></div></td>
            <td><div id="32"></div></td>
            <td><div id="33"></div></td>
        </tr>
    </table>
    
    <div id="currContainer">
        <h2 >Current Player : </h2>
        <h2 id="curr"></h2>
    </div>
    
    <button id="new-game">New Game</button>

    <script src="script.js"></script>
</body>
</html>
